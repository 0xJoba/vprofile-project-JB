name: vProfile CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  # This resolves the Node.js 20 deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Build with Maven
        run: mvn install -DskipTests

      - name: Run tests
        run: mvn test

      # Upload the artifact so the Deploy job can use it
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-artifact
          path: target/vprofile-v2.war

  deploy:
    name: Deploy to Beanstalk
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Download the artifact from the previous job
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: vprofile-artifact
          path: target/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Ensure "AWS_REGION" is defined in your GitHub Secrets (e.g., us-east-1)
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload artifact to S3
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          VERSION_LABEL=vprofile-$TIMESTAMP
          aws s3 cp target/vprofile-v2.war \
            s3://${{ secrets.S3_BUCKET }}/$VERSION_LABEL.war
          echo "VERSION_LABEL=$VERSION_LABEL" >> $GITHUB_ENV

      - name: Create Beanstalk application version
        run: |
          aws elasticbeanstalk create-application-version \
            --application-name ${{ secrets.EB_APPLICATION_NAME }} \
            --version-label ${{ env.VERSION_LABEL }} \
            --source-bundle S3Bucket=${{ secrets.S3_BUCKET }},S3Key=${{ env.VERSION_LABEL }}.war

      - name: Deploy to Beanstalk
        run: |
          aws elasticbeanstalk update-environment \
            --application-name ${{ secrets.EB_APPLICATION_NAME }} \
            --environment-name ${{ secrets.EB_ENVIRONMENT_NAME }} \
            --version-label ${{ env.VERSION_LABEL }}

      - name: Deployment complete
        run: echo "Deployed ${{ env.VERSION_LABEL }} to Beanstalk!"
